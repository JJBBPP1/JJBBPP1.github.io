
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  /* Visually hidden helper for screen readers */
  .sr-only { position: absolute !important; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

  #app { padding: 1.5rem 0; max-width: 640px; margin: 0 auto; }

  .header { margin-bottom: 1.5rem; }
  .header h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .header p { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; }
  .stat-num { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .stat-label { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }

  .input-area { display: flex; gap: 8px; margin-bottom: 1rem; }
  .input-area input { flex: 1; height: 36px; padding: 0 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px; font-family: var(--font-sans); }
  .input-area input:focus { outline: none; border-color: var(--color-border-primary); }
  .input-area input::placeholder { color: var(--color-text-tertiary); }

  .filters { display: flex; gap: 6px; margin-bottom: 1rem; }
  .filter-btn { font-size: 12px; padding: 4px 12px; border-radius: 99px; border: 0.5px solid var(--color-border-tertiary); background: transparent; color: var(--color-text-secondary); cursor: pointer; font-family: var(--font-sans); }
  .filter-btn:hover { background: var(--color-background-secondary); }
  .filter-btn.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: transparent; }

  .todo-list { display: flex; flex-direction: column; gap: 6px; }

  .todo-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); transition: border-color 0.15s; }
  .todo-item:hover { border-color: var(--color-border-secondary); }
  .todo-item.done { opacity: 0.55; }

  .todo-check { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--color-border-secondary); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .todo-check.checked { background: var(--color-text-primary); border-color: var(--color-text-primary); }
  .todo-check.checked::after { content: ''; width: 5px; height: 8px; border: 1.5px solid var(--color-background-primary); border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); display: block; }

  .todo-text { flex: 1; font-size: 14px; color: var(--color-text-primary); }
  .todo-text.done { text-decoration: line-through; color: var(--color-text-secondary); }

  .todo-meta { font-size: 11px; color: var(--color-text-tertiary); white-space: nowrap; }

  .todo-del { background: transparent; border: none; color: var(--color-text-tertiary); cursor: pointer; padding: 2px 4px; border-radius: 4px; font-size: 16px; line-height: 1; }
  .todo-del:hover { color: #E24B4A; background: #FCEBEB; }

  .empty { text-align: center; padding: 3rem 0; color: var(--color-text-secondary); font-size: 14px; }
  .empty i { font-size: 32px; display: block; margin-bottom: 8px; color: var(--color-text-tertiary); }

  .bulk { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; padding-top: 1rem; border-top: 0.5px solid var(--color-border-tertiary); }
  .bulk span { font-size: 12px; color: var(--color-text-secondary); }
  .bulk button { font-size: 12px; color: #E24B4A; background: transparent; border: none; cursor: pointer; font-family: var(--font-sans); }
  .bulk button:hover { text-decoration: underline; }

  .tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; margin-left: 6px; }
  .tag-work { background: #E6F1FB; color: #0C447C; }
  .tag-personal { background: #EAF3DE; color: #27500A; }
  .tag-urgent { background: #FAECE7; color: #712B13; }

  .add-meta { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .tag-btn { font-size: 11px; padding: 3px 10px; border-radius: 99px; border: 0.5px solid var(--color-border-tertiary); background: transparent; color: var(--color-text-secondary); cursor: pointer; font-family: var(--font-sans); }
  .tag-btn:hover { background: var(--color-background-secondary); }
  .tag-btn.sel-work { background: #E6F1FB; color: #0C447C; border-color: transparent; }
  .tag-btn.sel-personal { background: #EAF3DE; color: #27500A; border-color: transparent; }
  .tag-btn.sel-urgent { background: #FAECE7; color: #712B13; border-color: transparent; }
  .tag-btn.sel-none { background: transparent; color: var(--color-text-primary); border-color: transparent; }

  /* Focus styles for keyboard users */
  .filter-btn:focus, .tag-btn:focus, .todo-check:focus, .todo-del:focus, button:focus { outline: 3px solid rgba(0,123,255,0.15); outline-offset: 2px; }

  /* Modern theme overrides */
  body { background: #f6f8fb; color: #0f1724; }
  #app { background: transparent; padding: 2rem 1rem; }
  .header h1 { font-size: 1.45rem; letter-spacing: -0.3px; }
  .header p { color: #475569; }

  .stats { gap: 12px; }
  .stat { background: #ffffff; box-shadow: 0 6px 18px rgba(15,23,42,0.06); border: none; }
  .stat-num { font-size: 1.3rem; color: #0f1724; }

  .input-area input { background: #fff; border: 1px solid #e6eef8; box-shadow: 0 2px 6px rgba(16,24,40,0.03); }
  .input-area button { background: #2563eb; border-color: #2563eb; color: #fff; }

  .filters { gap: 8px; }
  .filter-btn { background: transparent; border: 1px solid transparent; color: #475569; }
  .filter-btn.active { background: #2563eb; color: #fff; box-shadow: 0 6px 18px rgba(37,99,235,0.12); }

  .todo-item { background: #fff; border: none; box-shadow: 0 8px 24px rgba(15,23,42,0.04); }
  .todo-item.done { opacity: 0.7; }

  .todo-check { width: 20px; height: 20px; border-radius: 6px; }
  .todo-check.checked { background: #2563eb; border-color: #2563eb; }

  .tag { margin-left: 8px; font-weight: 600; opacity: 0.95; }

  .db-status { font-size: 12px; color: #334155; }
  .db-dot { width: 8px; height: 8px; }

  /* Responsive: stack stats on narrow viewports */
  @media (max-width: 520px) {
    .stats { grid-template-columns: 1fr; }
    .input-area { flex-direction: column; }
    .input-area button { width: 100%; }
    .add-meta { justify-content: flex-start; }
  }

  .db-status { font-size: 11px; color: var(--color-text-tertiary); display: flex; align-items: center; gap: 4px; }
  .db-dot { width: 6px; height: 6px; border-radius: 50%; background: #639922; display: inline-block; }

  button { cursor: pointer; }
  button[disabled] { opacity: 0.4; cursor: not-allowed; }
</style>

<script type="module">

    messagingSenderId: "273930695051",

  const app = initializeApp(firebaseConfig);

<div id="app">
  <div class="header" style="display:flex; justify-content:space-between; align-items:flex-start;">
    <div>
      <h1><i class="ti ti-check" aria-hidden="true" style="font-size:20px; vertical-align:-2px; margin-right:6px;"></i>Mis tareas</h1>
      <p>Tus tareas se guardan automáticamente</p>
    </div>
    <div class="db-status" id="db-status"><span class="db-dot"></span> Base de datos conectada</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-num" id="stat-pending">0</div><div class="stat-label">Pendientes</div></div>
    <div class="stat"><div class="stat-num" id="stat-done">0</div><div class="stat-label">Completadas</div></div>
  </div>

  <div class="input-area">
    <input type="text" id="new-task" placeholder="Nueva tarea..." maxlength="120" />
    <input type="date" id="new-task-date" aria-label="Fecha de vencimiento" style="height:36px; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-secondary); padding:0 8px; background:var(--color-background-primary); color:var(--color-text-primary);" />
    <button type="button" onclick="addTask()" aria-label="Añadir tarea" style="height:36px; padding:0 16px; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-secondary); background:var(--color-text-primary); color:var(--color-background-primary); font-size:14px; font-family:var(--font-sans);">
      <i class="ti ti-plus" aria-hidden="true"></i> Añadir
    </button>
  </div>

  <div class="add-meta">
    <span style="font-size:12px; color:var(--color-text-secondary); margin-right:2px;">Etiqueta:</span>
    <button type="button" class="tag-btn" id="tag-none" onclick="selectTag('')">Ninguna</button>
    <button type="button" class="tag-btn" id="tag-work" onclick="selectTag('work')">💼 Trabajo</button>
    <button type="button" class="tag-btn" id="tag-personal" onclick="selectTag('personal')">🏠 Personal</button>
    <button type="button" class="tag-btn" id="tag-urgent" onclick="selectTag('urgent')">🔥 Urgente</button>
  </div>

  <div class="filters">
    <button type="button" class="filter-btn active" id="f-all" onclick="setFilter('all')">Todas</button>
    <button type="button" class="filter-btn" id="f-pending" onclick="setFilter('pending')">Pendientes</button>
    <button type="button" class="filter-btn" id="f-done" onclick="setFilter('done')">Completadas</button>
  </div>

  <div class="todo-list" id="todo-list"></div>

  <div class="bulk" id="bulk-bar" style="display:none;">
    <span id="bulk-info"></span>
    <button onclick="clearDone()">Eliminar completadas</button>
  </div>
</div>

<script>
let tasks = [];
let filter = 'all';
let selectedTag = '';
let saving = false;

const STORAGE_KEY = 'tasks_v1';
const FIREBASE_ENABLED = true;

async function storageGet(key) {
  if (FIREBASE_ENABLED && window.firebaseTasksDoc && window.firebaseGetDoc) {
    try {
      const snapshot = await window.firebaseGetDoc(window.firebaseTasksDoc);
      if (snapshot.exists()) {
        const data = snapshot.data();
        // Si data.tasks existe, lo convertimos a un String JSON limpio para tu app
        const tasksArray = Array.isArray(data.tasks) ? data.tasks : Object.values(data.tasks || {});
        return { value: JSON.stringify(tasksArray) };
      }
    } catch (e) {
      console.warn('Firebase read failed:', e);
    }
  }

  if (window.storage && typeof window.storage.get === 'function') {
    try { return await window.storage.get(key); } catch(e) { return { value: null }; }
  }
  return { value: localStorage.getItem(key) };
}

async function storageSet(key, value) {
  if (FIREBASE_ENABLED && window.firebaseTasksDoc && window.firebaseSetDoc) {
    try {
      const items = JSON.parse(value); // Convierte el string del localStorage a Array real
      
      // Guardamos en Firestore asegurando que 'tasks' sea un Array
      await window.firebaseSetDoc(window.firebaseTasksDoc, {
        tasks: Array.from(items), 
        updatedAt: new Date().toISOString()
      });
      return;
    } catch (e) {
      console.warn('Firebase save failed:', e);
    }
  }

  if (window.storage && typeof window.storage.set === 'function') {
    try { return await window.storage.set(key, value); } catch(e) { localStorage.setItem(key, value); }
  }
  localStorage.setItem(key, value);
}

async function loadTasks() {
  try {
    const result = await storageGet(STORAGE_KEY);
    if (result && result.value) {
      tasks = JSON.parse(result.value);
    }
  } catch(e) {
    tasks = [];
  }
  render();
}

async function saveTasks() {
  if (saving) return;
  saving = true;
  const status = document.getElementById('db-status');
  if (FIREBASE_ENABLED) {
    status.innerHTML = '<span class="db-dot" style="background:#BA7517"></span> Guardando en Firebase…';
  } else {
    status.innerHTML = '<span class="db-dot" style="background:#BA7517"></span> Guardando…';
  }
  try {
    await storageSet(STORAGE_KEY, JSON.stringify(tasks));
    if (FIREBASE_ENABLED) {
      status.innerHTML = '<span class="db-dot"></span> Guardado en Firebase';
    } else {
      status.innerHTML = '<span class="db-dot"></span> Guardado';
    }
    setTimeout(() => { status.innerHTML = '<span class="db-dot"></span> Base de datos conectada'; }, 1200);
  } catch(e) {
    status.innerHTML = '<span class="db-dot" style="background:#E24B4A"></span> Error al guardar';
  }
  saving = false;
}

function selectTag(t) {
  selectedTag = t;
  // remove selection classes, keep base class
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('sel-work','sel-personal','sel-urgent','sel-none'));
  if (t) {
    const el = document.getElementById('tag-' + t);
    if (el) el.classList.add('sel-' + t);
  } else {
    const none = document.getElementById('tag-none');
    if (none) none.classList.add('sel-none');
  }
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('f-' + f).classList.add('active');
  render();
}

function addTask() {
  const input = document.getElementById('new-task');
  const inputDate = document.getElementById('new-task-date');
  const text = input.value.trim();
  if (!text) { input.focus(); return; }
  const now = new Date();
  tasks.unshift({
    id: Date.now(),
    text,
    done: false,
    tag: selectedTag,
    created: now.toISOString(),
    due: inputDate && inputDate.value ? new Date(inputDate.value).toISOString() : null
  });
  input.value = '';
  if (inputDate) inputDate.value = '';
  saveTasks();
  render();
}

function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) t.done = !t.done;
  saveTasks();
  render();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  render();
}

function clearDone() {
  tasks = tasks.filter(t => !t.done);
  saveTasks();
  render();
}

function fmtDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = Math.floor((now - d) / 60000);
  if (diff < 1) return 'ahora mismo';
  if (diff < 60) return `hace ${diff} min`;
  if (diff < 1440) return `hace ${Math.floor(diff/60)}h`;
  return d.toLocaleDateString('es-ES', { day:'numeric', month:'short' });
}

function fmtDateShort(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('es-ES', { day:'numeric', month:'short' });
}

function isOverdue(iso) {
  if (!iso) return false;
  const d = new Date(iso);
  const now = new Date();
  // consider overdue if due date is before today (end of day)
  return d.setHours(23,59,59,999) < now.getTime();
}

function render() {
  const visible = tasks.filter(t => {
    if (filter === 'pending') return !t.done;
    if (filter === 'done') return t.done;
    return true;
  });

  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const pending = total - done;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-done').textContent = done;

  const list = document.getElementById('todo-list');

  if (visible.length === 0) {
    const msgs = { all: 'Sin tareas todavía', pending: 'No hay tareas pendientes', done: 'Nada completado aún' };
    const icons = { all: 'ti-clipboard', pending: 'ti-circle-check', done: 'ti-trophy' };
    list.innerHTML = `<div class="empty"><i class="ti ${icons[filter]}" aria-hidden="true"></i>${msgs[filter]}</div>`;
  } else {
    list.innerHTML = visible.map(t => {
      const tagHtml = t.tag ? `<span class="tag tag-${t.tag}">${{work:'Trabajo', personal:'Personal', urgent:'Urgente'}[t.tag]}</span>` : '';
      const dueHtml = t.due ? `<div style="font-size:11px; color:${(isOverdue(t.due) && !t.done) ? '#B91C1C' : '#475569'}; margin-left:8px">${t.done ? '' : (isOverdue(t.due) ? 'Vencida: ' : 'Para: ')}${fmtDateShort(t.due)}</div>` : '';
      return `
        <div class="todo-item${t.done ? ' done' : ''}">
          <div class="todo-check${t.done ? ' checked' : ''}" onclick="toggleTask(${t.id})" role="checkbox" aria-checked="${t.done}" tabindex="0"></div>
          <div style="display:flex; flex-direction:column; flex:1">
            <span class="todo-text${t.done ? ' done' : ''}">${escHtml(t.text)} ${tagHtml}</span>
            <div style="display:flex; gap:8px; align-items:center; margin-top:6px;">
              <span class="todo-meta">${fmtDate(t.created)}</span>
              ${dueHtml}
            </div>
          </div>
          <button type="button" class="todo-del" onclick="deleteTask(${t.id})" aria-label="Eliminar tarea"><i class="ti ti-trash" aria-hidden="true" style="font-size:15px;"></i></button>
        </div>`;
    }).join('');
  }

  const bulk = document.getElementById('bulk-bar');
  if (done > 0) {
    bulk.style.display = 'flex';
    document.getElementById('bulk-info').textContent = `${done} tarea${done > 1 ? 's' : ''} completada${done > 1 ? 's' : ''}`;
  } else {
    bulk.style.display = 'none';
  }
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('new-task').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

// keyboard support: toggle tasks when focused and user presses Enter or Space
document.addEventListener('keydown', (e) => {
  const el = document.activeElement;
  if (!el) return;
  if (el.classList && el.classList.contains('todo-check') && (e.key === 'Enter' || e.key === ' ')) {
    e.preventDefault();
    el.click();
  }
});

selectTag('');
loadTasks();
</script>
