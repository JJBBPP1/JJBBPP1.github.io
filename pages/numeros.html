<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Números - Mayor, Menor y Ordenar</title>
    <link rel="icon" type="image/png" href="../multimedia/icono.png">
    <link rel="stylesheet" href="../css/javas.css">
    <style>
        body { max-width: 600px; margin: 50px auto; padding: 20px; }
        input { margin: 5px; padding: 8px; width: 120px; }
        button { margin: 5px; padding: 10px 15px; }
        #resultado { padding: 15px; border-radius: 5px; min-height: 40px; }
    </style>
    <!-- background: #f0f0f0; -->
</head>
<body>
    <h1>3 Números: Mayor, Menor y Ordenar</h1>
    <p>Introduce 3 números:</p>
    <input type="number" id="num1" placeholder="Número 1">
    <input type="number" id="num2" placeholder="Número 2">
    <input type="number" id="num3" placeholder="Número 3">
    <br><br>
    <button class="buttons-1" onclick="mostrarMayor()">Mayor</button>
    <button class="buttons-1" onclick="ordenarDesc()">Mayor a Menor</button>
    <button class="buttons-1" onclick="ordenarAsc()">Menor a Mayor</button>
    <button class="buttons-1" onclick="mostrarMenor()">Menor</button>
    <div id="resultado" style="margin-top: 20px; font-weight: bold; font-size: 18px;"></div>

    <script>
    function mostrarMayor() {
        const num1 = parseFloat(document.getElementById('num1').value);
        const num2 = parseFloat(document.getElementById('num2').value);
        const num3 = parseFloat(document.getElementById('num3').value);
        
        if (isNaN(num1) || isNaN(num2) || isNaN(num3)) {
            document.getElementById('resultado').innerHTML = 'Por favor, introduce 3 números válidos.';
            return;
        }
        
        const mayor = Math.max(num1, num2, num3);
        const mayorDisplay = Number.isInteger(mayor) ? mayor : mayor.toFixed(2);
        document.getElementById('resultado').innerHTML = `El mayor es ${mayorDisplay}.`;
    }

    function ordenarDesc() {
        const num1 = parseFloat(document.getElementById('num1').value);
        const num2 = parseFloat(document.getElementById('num2').value);
        const num3 = parseFloat(document.getElementById('num3').value);
        
        if (isNaN(num1) || isNaN(num2) || isNaN(num3)) {
            document.getElementById('resultado').innerHTML = 'Por favor, introduce 3 números válidos.';
            return;
        }
        
        const numeros = [num1, num2, num3].sort((a, b) => b - a);
        const ordenados = numeros.map(n => Number.isInteger(n) ? n : n.toFixed(2)).join(', ');
        document.getElementById('resultado').innerHTML = `Ordenados (mayor a menor): ${ordenados}`;
    }

    function ordenarAsc() {
        const num1 = parseFloat(document.getElementById('num1').value);
        const num2 = parseFloat(document.getElementById('num2').value);
        const num3 = parseFloat(document.getElementById('num3').value);
        
        if (isNaN(num1) || isNaN(num2) || isNaN(num3)) {
            document.getElementById('resultado').innerHTML = 'Por favor, introduce 3 números válidos.';
            return;
        }
        
        const numeros = [num1, num2, num3].sort((a, b) => a - b);
        const ordenados = numeros.map(n => Number.isInteger(n) ? n : n.toFixed(2)).join(', ');
        document.getElementById('resultado').innerHTML = `Ordenados (menor a mayor): ${ordenados}`;
    }

    function mostrarMenor() {
        const num1 = parseFloat(document.getElementById('num1').value);
        const num2 = parseFloat(document.getElementById('num2').value);
        const num3 = parseFloat(document.getElementById('num3').value);
        
        if (isNaN(num1) || isNaN(num2) || isNaN(num3)) {
            document.getElementById('resultado').innerHTML = 'Por favor, introduce 3 números válidos.';
            return;
        }
        
        const menor = Math.min(num1, num2, num3);
        const menorDisplay = Number.isInteger(menor) ? menor : menor.toFixed(2);
        document.getElementById('resultado').innerHTML = `El menor es ${menorDisplay}.`;
    }
    </script>
</body>
</html>
