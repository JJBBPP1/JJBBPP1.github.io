<!DOCTYPE html>
<html lang="es">
<head>
<link rel="stylesheet" href="../css/hojas_practicas.css">
    <title>Hoja de Seguimiento de Prácticas 2025-2026</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <h1>Hoja de Seguimiento de Prácticas</h1>
    <p>Curso 2025-2026 - Aplicaciones Web</p>
    <div class="file-upload-area" onclick="document.getElementById('fileInput').click()">
        <h3>📁 Subir archivo de práctica</h3>
        <p>Arrastra archivos locales o pega URL de Google Drive</p>
        <label for="fileInput" style="display: block; margin-bottom: 10px; font-weight: bold; cursor: pointer;">Seleccionar archivos locales (PDF, imágenes, texto):</label>
        <input type="file" id="fileInput" multiple accept="image/*,.pdf,.txt">
        <input type="url" id="driveUrl" placeholder="Pegar URL de Google Drive aquí..." style="display: block; width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
        <button class="upload-btn" onclick="loadFromDrive()">Cargar desde Google Drive</button>
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Examinar archivos locales</button>
    </div>
    
    <div id="previewContainer" class="preview-container"></div>
</body>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const fileInput = document.getElementById('fileInput');
    const previewContainer = document.getElementById('previewContainer');
    const uploadArea = document.querySelector('.file-upload-area');

    fileInput.addEventListener('change', handleFiles);
    uploadArea.addEventListener('dragover', handleDragOver);
    uploadArea.addEventListener('dragleave', handleDragLeave);
    uploadArea.addEventListener('drop', handleDrop);

    function handleFiles(e) {
        const files = Array.from(e.target.files);
        files.forEach(file => createPreview(file));
    }

    function handleDragOver(e) {
        e.preventDefault();
        uploadArea.classList.add('dragover');
    }

    function handleDragLeave(e) {
        uploadArea.classList.remove('dragover');
    }

    function handleDrop(e) {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        const files = Array.from(e.dataTransfer.files);
        files.forEach(file => createPreview(file));
    }

    function createPreview(file, isRemote = false) {
        const previewDiv = document.createElement('div');
        previewDiv.className = 'preview-item';
        
        const fileName = document.createElement('h4');
        fileName.textContent = file.name || file.url.split('/').pop();
        fileName.style.margin = '0 0 10px 0';
        
        const closeBtn = document.createElement('button');
        closeBtn.className = 'close-btn';
        closeBtn.innerHTML = '×';
        closeBtn.onclick = () => previewDiv.remove();
        
        previewDiv.appendChild(closeBtn);
        
        if (file.type && file.type.startsWith('image/') || (!isRemote && file.name.toLowerCase().match(/\.(jpg|jpeg|png|gif|webp)$/))) {
            const img = document.createElement('img');
            img.src = isRemote ? file.url : URL.createObjectURL(file);
            img.onerror = () => img.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZGRkIi8+PHRleHQgeD0iNTAlIiB5PSI5NSUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPkltYWdlIG5vIGF2YWlsYWJsZTwvdGV4dD48L3N2Zz4=';
            previewDiv.appendChild(img);
        } else if (file.name && file.name.toLowerCase().endsWith('.pdf') || isRemote && file.url.includes('drive.google.com')) {
            const pdfLink = document.createElement('a');
            pdfLink.href = isRemote ? file.url : URL.createObjectURL(file);
            pdfLink.target = '_blank';
            pdfLink.className = 'pdf-download-btn';
            pdfLink.innerHTML = '📄 <strong>Descargar/Ver PDF</strong>';
            pdfLink.style.display = 'block';
            pdfLink.style.marginTop = '10px';
            pdfLink.style.padding = '10px';
            pdfLink.style.background = '#e74c3c';
            pdfLink.style.color = 'white';
            pdfLink.style.textDecoration = 'none';
            pdfLink.style.borderRadius = '5px';
            pdfLink.style.textAlign = 'center';
            previewDiv.appendChild(pdfLink);
        } else {
            const contentDiv = document.createElement('div');
            contentDiv.style.whiteSpace = 'pre-wrap';
            contentDiv.style.fontFamily = 'monospace';
            contentDiv.style.maxHeight = '300px';
            contentDiv.style.overflow = 'auto';
            contentDiv.style.padding = '10px';
            contentDiv.style.background = '#f8f9fa';
            contentDiv.style.borderRadius = '5px';
            if (isRemote) {
                fetch(file.url)
                    .then(response => response.text())
                    .then(text => contentDiv.textContent = text.substring(0, 2000) + (text.length > 2000 ? '...' : ''))
                    .catch(() => contentDiv.textContent = 'No se pudo cargar el contenido remoto');
            } else {
                const reader = new FileReader();
                reader.onload = (e) => contentDiv.textContent = e.target.result.substring(0, 2000);
                reader.readAsText(file);
            }
            previewDiv.appendChild(contentDiv);
        }
        
        previewDiv.appendChild(fileName);
        previewContainer.appendChild(previewDiv);
    }

    window.loadFromDrive = function() {
        const urlInput = document.getElementById('driveUrl');
        const url = urlInput.value.trim();
        if (url) {
            const file = { name: 'drive_file.pdf', url: url, isRemote: true };
            createPreview(file, true);
            urlInput.value = '';
        }
    };
});
</script>
</html>
