<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
    <link rel="stylesheet" href="../css/form.css">
    <link rel="icon" href="../multimedia/chema.jpeg" type="image/jpeg">
</head>
<body>
    <form id="formulario" method="POST" action="">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" autofocus required placeholder="Nombre" required><br><br>

        <label for="email">Correo Electrónico:</label>
        <input type="email" id="email" name="email" required placeholder="Gmail" required><br><br>

        <label for="mensaje">Mensaje:</label><br>
        <textarea id="mensaje" name="mensaje" rows="4" cols="50"></textarea><br><br>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required>
        <input type="checkbox" id="mostrarPassword" name="mostrarPassword">
        <label for="mostrarPassword" class="inline">Mostrar contraseña</label><br><br>

        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" placeholder="Ej: +34 600 123 456">

        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad"><br><br>

        <label for="fecha_nacimiento">Fecha de Nacimiento:</label>
        <input type="date" id="fecha_nacimiento" name="fecha_nacimiento"><br><br>

        <label for="fecha_hora">Fecha y Hora:</label>
        <input type="datetime-local" id="fecha_hora" name="fecha_hora"><br><br>

        <label for="direccion">Dirección:</label>
        <input type="text" id="direccion" name="direccion"><br><br>

        <label for="ciudad">Ciudad:</label>
        <input type="text" id="ciudad" name="ciudad"><br><br>

        <label for="pais">País:</label>
        <select id="pais" name="pais" required>
            <option value="" selected>Selecciona un país</option>
            <option value="España">España</option>
            <option value="Francia">Francia</option>
            <option value="Italia">Italia</option>
            <option value="Alemania">Alemania</option>
            <option value="México">México</option>
        </select><br><br>


        <label for="number">Numero</label>
        <input type="number" id="number" name="number" min="0" max="10"><br><br>

        <label class="inline">Género:</label><br>
        <input type="radio" id="masculino" name="genero" value="masculino"><label for="masculino" class="inline">Masculino</label><br>
        <input type="radio" id="femenino" name="genero" value="femenino"><label for="femenino" class="inline">Femenino</label><br>
        <input type="radio" id="otro" name="genero" value="otro"><label for="otro" class="inline">Otro</label><br><br>

        <input type="checkbox" id="terminos" name="terminos">
        <label for="terminos" class="inline">Acepto los términos y condiciones</label><br><br>


        <input type="submit" value="Enviar">
    </form>

    <script>
        // Mostrar/ocultar contraseña
        document.getElementById('mostrarPassword').addEventListener('change', function() {
            const passwordInput = document.getElementById('password');
            if (this.checked) {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        });

        document.getElementById('formulario').addEventListener('submit', function(event) {
            event.preventDefault();

            const form = event.target;
            const nombre = form.nombre.value.trim() || 'No especificado';
            const email = form.email.value.trim() || 'No especificado';
            const mensaje = form.mensaje.value.trim() || 'No especificado';
            const password = form.password.value ? '*****' : 'No especificado';
            const telefono = form.telefono.value.trim() || 'No especificado';
            const edad = form.edad.value || 'No especificado';
            const fechaNacimiento = form.fecha_nacimiento.value || 'No especificado';
            const fechaHora = form.fecha_hora.value || 'No especificado';
            const direccion = form.direccion.value.trim() || 'No especificado';
            const ciudad = form.ciudad.value.trim() || 'No especificado';
            const pais = form.pais.value || 'No especificado';
            const number = form.number.value || 'No especificado';
            const genero = form.querySelector('input[name="genero"]:checked')?.value || 'No especificado';
            const terminos = form.terminos.checked ? 'Sí' : 'No';

            const mensajeAlerta =
                `Datos del formulario:\n` +
                `Nombre: ${nombre}\n` +
                `Correo Electrónico: ${email}\n` +
                `Mensaje: ${mensaje}\n` +
                `Contraseña: ${password}\n` +
                `Teléfono: ${telefono}\n` +
                `Edad: ${edad}\n` +
                `Fecha de Nacimiento: ${fechaNacimiento}\n` +
                `Fecha y Hora: ${fechaHora}\n` +
                `Dirección: ${direccion}\n` +
                `Ciudad: ${ciudad}\n` +
                `País: ${pais}\n` +
                `Número: ${number}\n` +
                `Género: ${genero}\n` +
                `Acepta términos: ${terminos}`;

            alert(mensajeAlerta);
        });
    </script>
</body>
</html>
