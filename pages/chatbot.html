
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --accent:#1a1a2e;--accent2:#e94560;--bg:#f7f6f2;--surface:#ffffff;
    --border:rgba(0,0,0,0.08);--text:#1a1a2e;--muted:#888;--radius:14px;
    --user-bg:#1a1a2e;--user-text:#fff;--bot-bg:#fff;--bot-border:rgba(0,0,0,0.08);
  }
  #app{font-family:'Syne',sans-serif;background:var(--bg);min-height:520px;display:flex;flex-direction:column;border-radius:var(--radius);overflow:hidden;border:0.5px solid var(--border);}
  #header{background:var(--accent);padding:18px 24px;display:flex;align-items:center;gap:14px;}
  #header-dot{width:38px;height:38px;background:var(--accent2);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  #header-dot span{color:#fff;font-size:18px;font-family:'JetBrains Mono',monospace;}
  #header-title{color:#fff;font-size:16px;font-weight:700;letter-spacing:-.3px;}
  #header-sub{color:rgba(255,255,255,0.5);font-size:11px;font-family:'JetBrains Mono',monospace;margin-top:2px;}
  #header-status{margin-left:auto;display:flex;align-items:center;gap:6px;color:rgba(255,255,255,0.6);font-size:11px;}
  #status-dot{width:7px;height:7px;background:#4ade80;border-radius:50%;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  #messages{flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:14px;min-height:320px;max-height:380px;}
  #messages::-webkit-scrollbar{width:4px;}
  #messages::-webkit-scrollbar-track{background:transparent;}
  #messages::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:4px;}
  .msg{display:flex;flex-direction:column;gap:4px;animation:fadeUp .25s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{align-items:flex-end;}
  .msg.bot{align-items:flex-start;}
  .bubble{padding:11px 16px;border-radius:12px;font-size:14px;line-height:1.6;max-width:82%;}
  .msg.user .bubble{background:var(--user-bg);color:var(--user-text);border-bottom-right-radius:3px;}
  .msg.bot .bubble{background:var(--bot-bg);color:var(--text);border:0.5px solid var(--bot-border);border-bottom-left-radius:3px;}
  .msg-time{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
  .typing{display:flex;gap:5px;align-items:center;padding:12px 16px;background:var(--bot-bg);border:0.5px solid var(--bot-border);border-radius:12px;border-bottom-left-radius:3px;width:64px;}
  .dot{width:6px;height:6px;background:#bbb;border-radius:50%;animation:blink 1.2s infinite;}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{transform:scale(1);opacity:.5}40%{transform:scale(1.2);opacity:1}}
  #input-area{padding:14px 18px;background:var(--surface);border-top:0.5px solid var(--border);display:flex;gap:10px;align-items:flex-end;}
  #msg-input{flex:1;border:0.5px solid rgba(0,0,0,0.15);border-radius:10px;padding:10px 14px;font-family:'Syne',sans-serif;font-size:14px;resize:none;min-height:42px;max-height:100px;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s;}
  #msg-input:focus{border-color:var(--accent2);}
  #send-btn{background:var(--accent2);border:none;width:42px;height:42px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s,opacity .15s;}
  #send-btn:hover{opacity:.85;}
  #send-btn:active{transform:scale(.95);}
  #send-btn svg{width:18px;height:18px;fill:#fff;}
  #clear-btn{background:transparent;border:0.5px solid rgba(0,0,0,0.15);width:42px;height:42px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
  #clear-btn:hover{background:rgba(0,0,0,0.05);}
  #clear-btn svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;}
  #error-bar{display:none;background:#fef2f2;border:0.5px solid #fecaca;color:#dc2626;font-size:12px;padding:8px 18px;font-family:'JetBrains Mono',monospace;}
  .chip{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;transition:background .15s,border-color .15s;color:var(--text);}
  .chip:hover{background:#f0eeea;border-color:rgba(0,0,0,0.2);}
  #chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 18px 12px;}
</style>

<div id="app">
  <div id="header">
    <div id="header-dot"><span>∿</span></div>
    <div>
      <div id="header-title">Asistente IA</div>
      <div id="header-sub">ChatGPT-style · búsqueda inteligente</div>
    </div>
    <div id="header-status"><div id="status-dot"></div>en línea</div>
  </div>

  <div id="error-bar" role="alert"></div>

  <div id="chips">
    <div class="chip" onclick="sendChip('¿Qué puedes hacer por mí?')">💡 ¿Qué puedes hacer?</div>
    <div class="chip" onclick="sendChip('Explícame qué es la inteligencia artificial en 3 líneas')">🤖 ¿Qué es la IA?</div>
    <div class="chip" onclick="sendChip('Dame 3 ideas creativas para un proyecto de programación')">🚀 Ideas de proyecto</div>
  </div>

  <div id="messages">
    <div class="msg bot">
      <div class="bubble">Asistente IA listo. Proporciono respuestas claras y precisas, soporte técnico y orientación en tiempo real. Envíame tu consulta y responderé de forma inmediata.</div>
      <div class="msg-time">ahora</div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="msg-input" placeholder="Escribe tu mensaje…" rows="1"></textarea>
    <button id="clear-btn" title="Limpiar chat">
      <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
    </button>
    <button id="send-btn" id="send-btn" title="Enviar">
      <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/></svg>
    </button>
  </div>
</div>

<script>
const messagesEl=document.getElementById('messages');
const input=document.getElementById('msg-input');
const sendBtn=document.getElementById('send-btn');
const clearBtn=document.getElementById('clear-btn');
const errorBar=document.getElementById('error-bar');
let history=[];
let busy=false;

function now(){const d=new Date();return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');}

function addMsg(role,text){
  const div=document.createElement('div');
  div.className='msg '+role;
  const b=document.createElement('div');
  b.className='bubble';
  b.textContent=text;
  const t=document.createElement('div');
  t.className='msg-time';
  t.textContent=now();
  div.appendChild(b);div.appendChild(t);
  messagesEl.appendChild(div);
  messagesEl.scrollTop=messagesEl.scrollHeight;
  return b;
}

function showTyping(){
  const div=document.createElement('div');
  div.className='msg bot';div.id='typing-msg';
  const t=document.createElement('div');t.className='typing';
  [1,2,3].forEach(()=>{const d=document.createElement('div');d.className='dot';t.appendChild(d);});
  div.appendChild(t);messagesEl.appendChild(div);
  messagesEl.scrollTop=messagesEl.scrollHeight;
}
function hideTyping(){const e=document.getElementById('typing-msg');if(e)e.remove();}

function showError(msg){errorBar.style.display='block';errorBar.textContent='⚠ '+msg;setTimeout(()=>errorBar.style.display='none',5000);}

async function send(text){
  if(busy||!text.trim())return;
  busy=true;sendBtn.style.opacity='.4';
  errorBar.style.display='none';
  addMsg('user',text);
  history.push({role:'user',content:text});
  input.value='';input.style.height='auto';
  showTyping();
  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:'Eres una inteligencia artificial avanzada. Responde como un asistente estilo ChatGPT, usando conocimientos generales, simulando búsqueda y también incorporando datos que el usuario te proporcione. Actúa siempre como asistente virtual 100% IA. Responde en español, con precisión, claridad, sin presentarte como humano, y adapta la respuesta a la información del usuario.',
        messages:history
      })
    });
    if(!res.ok){const e=await res.json();throw new Error(e?.error?.message||'Error '+res.status);}
    const data=await res.json();
    const reply=data.content.map(b=>b.type==='text'?b.text:'').join('');
    hideTyping();
    addMsg('bot',reply);
    history.push({role:'assistant',content:reply});
  }catch(e){
    hideTyping();
    showError(e.message);
    history.pop();
  }
  busy=false;sendBtn.style.opacity='1';
}

function sendChip(t){input.value=t;send(t);}

sendBtn.addEventListener('click',()=>send(input.value));
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(input.value);}});
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,100)+'px';});
clearBtn.addEventListener('click',()=>{
  history=[];
  messagesEl.innerHTML='';
  addMsg('bot','Asistente IA reiniciado. Estoy listo para procesar tu próxima solicitud.');
});
</script>
