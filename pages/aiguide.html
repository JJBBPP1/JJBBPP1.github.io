<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Asistente IA - Aplicaciones Web. Herramienta educativa para aprender sobre inteligencia artificial y desarrollo web.">
    <meta name="keywords" content="IA, Asistente, Aplicaciones Web, Chat, Educación">
    <meta name="author" content="Javier Bravo">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://jjbbpp1.github.io/pages/aiguide.html">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Asistente IA - Aplicaciones Web">
    <meta property="og:description" content="Asistente IA educativo para aprender sobre aplicaciones web e inteligencia artificial.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jjbbpp1.github.io/pages/aiguide.html">
    
    <title>Asistente IA - Aplicaciones Web</title>
    <link rel="icon" type="image/png" href="../multimedia/icono.png">
    <link rel="stylesheet" href="../css/aiguide.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Asistente IA</h1>
            <h2>Aplicaciones Web</h2>
            <p class="subtitle">Herramienta educativa para aprender sobre inteligencia artificial</p>
        </header>

        <main class="chat-container">
            <div id="chat" class="chat-messages" aria-label="Área de chat"></div>
            
            <div class="chat-input-area">
                <input 
                    type="text" 
                    id="mensaje" 
                    class="input-mensaje" 
                    placeholder="Escribe tu pregunta..."
                    aria-label="Campo de entrada de mensaje"
                >
                <button id="btnEnviar" class="btn-enviar" title="Enviar mensaje">
                    <span>Enviar</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path>
                    </svg>
                </button>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 JJBBPP1 - Asistente IA Educativo</p>
        </footer>
    </div>

    <script src="../js/aiguide.js"></script>
</body>
</html>
